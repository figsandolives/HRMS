<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير البصمة</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232563eb'/%3E%3Cpath d='M18 30c0-7.7 6.3-14 14-14s14 6.3 14 14' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M23 38c0-5 4-9 9-9s9 4 9 9' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M32 41v8' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f7fb;--panel:#fff;--panel2:#eef2f7;--panel3:#f8fafc;--text:#111827;--text2:#64748b;--text3:#94a3b8;
  --heading:#0f172a;--accent:#2563eb;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--border:rgba(15,23,42,.11);
  --shadow:0 16px 40px rgba(15,23,42,.08);--radius:12px;
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{height:72px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px}
.brand-title{font-size:22px;font-weight:900;color:var(--heading)}
.brand-sub{font-size:12px;color:var(--text2);margin-top:2px}
.top-actions{display:flex;gap:10px;align-items:center}
.btn{height:40px;border:1px solid var(--border);border-radius:10px;padding:0 14px;font-family:'Tajawal',sans-serif;font-weight:800;background:var(--panel2);color:var(--heading);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.layout{max-width:1320px;margin:0 auto;padding:28px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:22px}
.toolbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}
.title{font-size:24px;font-weight:900;color:var(--heading)}
.subtitle{font-size:13px;color:var(--text2);margin-top:5px;min-height:20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.control{height:42px;border:1px solid var(--border);background:var(--panel2);border-radius:10px;padding:0 12px;font-family:'Tajawal',sans-serif;font-weight:800;color:var(--heading);min-width:150px;outline:none}
.control:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.14)}
.report-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin:0 0 16px}
.btn-danger{background:#fee2e2;border-color:#fecaca;color:#b91c1c}
.btn-muted{background:var(--panel3);color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--panel3);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-label{font-size:12px;color:var(--text2);font-weight:700}
.stat-value{font-size:24px;color:var(--heading);font-weight:900;margin-top:4px}
.status{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;background:rgba(245,158,11,.12);color:#92400e}
.status.connected{background:rgba(16,185,129,.12);color:#047857}
.status.error{background:rgba(239,68,68,.12);color:#b91c1c}
.grid-wrap{background:var(--panel3);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow)}
.fingerprint-table{width:100%;border-collapse:separate;border-spacing:0;min-width:760px;font-family:'Cairo',sans-serif}
.fingerprint-table th,.fingerprint-table td{border-left:1px solid var(--border);border-bottom:1px solid var(--border);padding:9px 10px;min-width:78px;height:42px;text-align:center;font-size:12px;white-space:nowrap}
.fingerprint-table th{background:var(--panel2);color:var(--heading);font-weight:800;position:sticky;top:0;z-index:2}
.fingerprint-table th:first-child,.fingerprint-table td:first-child{position:sticky;right:0;z-index:3;background:var(--panel3);width:1%;min-width:96px;max-width:260px;text-align:right;font-weight:800;color:var(--heading)}
.fingerprint-table th:first-child{background:var(--panel2);z-index:4}
.fingerprint-cell{position:relative;color:var(--text2)}
.fingerprint-cell.bridge{box-shadow:inset 0 0 0 9999px var(--bridge-color)}
.fingerprint-hit{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:48px;min-height:34px;padding:5px 9px;border-radius:12px;color:#fff;font-size:11px;font-weight:800;line-height:1.25;background:var(--hit-color);border:0;cursor:pointer;font-family:'Cairo',sans-serif}
.fingerprint-hit.issue{background:var(--red);min-width:150px}
.fingerprint-hit-branch{font-size:10px;font-weight:700;opacity:.9}
.fingerprint-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:14px}
.summary-card{background:var(--panel3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.summary-label{font-size:13px;color:var(--text2);font-weight:900}
.summary-value{font-size:24px;color:var(--heading);font-weight:900;margin-top:5px}
.summary-value.alert{color:var(--red)}
.empty{padding:44px 16px;text-align:center;color:var(--text3);background:var(--panel3);border:1px solid var(--border);border-radius:var(--radius);font-weight:800}
.hidden{display:none!important}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.52);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal-card{width:min(760px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:0 30px 80px rgba(15,23,42,.25);padding:22px}
.modal-head{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:22px;font-weight:900;color:var(--heading)}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:16px}
.form-field{display:flex;flex-direction:column;gap:7px}
.form-field label{font-size:13px;font-weight:900;color:var(--text2)}
.employee-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin:12px 0 16px}
.employee-option{border:1px solid var(--border);background:var(--panel3);border-radius:12px;padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:right}
.employee-option.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.13);background:#eff6ff}
.employee-avatar{width:42px;height:42px;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:900;flex:0 0 auto}
.employee-avatar img{width:100%;height:100%;object-fit:cover}
.employee-option-name{font-weight:900;color:var(--heading);font-size:13px;line-height:1.35}
.modal-actions{display:flex;gap:10px;justify-content:flex-start;margin-top:12px}
.edit-popover{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:0 18px 45px rgba(15,23,42,.2);padding:10px;display:flex;gap:8px;align-items:center}
.edit-popover .btn{height:34px;padding:0 12px;font-size:12px}
.export-sheet{direction:rtl;font-family:'Tajawal','Cairo',Arial,sans-serif;color:#111827;padding:18px}
.export-sheet h1{font-size:24px;margin:0 0 6px}
.export-sheet .export-subtitle{color:#64748b;margin-bottom:18px;font-weight:700}
.export-sheet table{width:100%;border-collapse:collapse}
.export-sheet th,.export-sheet td{border:1px solid #dbe3ef;padding:8px;text-align:center;font-size:12px}
.export-sheet th{background:#eef2f7;font-weight:900}
@media (max-width:760px){
  .topbar{height:auto;align-items:flex-start;gap:14px;padding:16px;flex-direction:column}
  .layout{padding:16px}
  .toolbar{flex-direction:column}
  .controls{justify-content:stretch;width:100%}
  .control,.btn{width:100%}
  .report-actions{justify-content:stretch}
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .fingerprint-summary{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .modal-actions{flex-direction:column}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">HR</div>
    <div>
      <div class="brand-title">تقرير البصمة</div>
    </div>
  </div>
  <div class="top-actions">
    <span class="status" id="connectionStatus">جاري الاتصال</span>
    <button class="btn" type="button" onclick="returnToSystem()">الرجوع للنظام</button>
  </div>
</header>

<main class="layout">
  <section class="panel">
    <div class="toolbar">
      <div>
        <div class="title">سجل البصمات</div>
        <div class="subtitle" id="reportSubtitle"></div>
      </div>
      <div class="controls">
        <select class="control" id="reportMode" onchange="renderReport()">
          <option value="day">كل الموظفين</option>
          <option value="employee">موظف محدد</option>
        </select>
        <input class="control" type="date" id="dayDate" onchange="renderReport()">
        <select class="control" id="employeeSelect" onchange="renderReport()" style="display:none"></select>
        <input class="control" type="date" id="fromDate" onchange="renderReport()" style="display:none">
        <input class="control" type="date" id="toDate" onchange="renderReport()" style="display:none">
      </div>
    </div>

    <div class="report-actions">
      <button class="btn btn-primary" type="button" onclick="openAddPunchModal()">إضافة بصمة جديدة</button>
      <button class="btn" type="button" onclick="downloadReportExcel()">تحميل Excel</button>
      <button class="btn" type="button" onclick="downloadReportPdf()">تحميل PDF</button>
    </div>

    <div id="reportView" class="empty">جاري تحميل بيانات البصمة...</div>
  </section>
</main>

<div class="modal-backdrop hidden" id="addPunchModal" onclick="closeAddPunchModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title">إضافة بصمة جديدة</div>
      <button class="btn btn-muted" type="button" onclick="closeAddPunchModal()">إغلاق</button>
    </div>
    <div class="form-grid">
      <div class="form-field">
        <label for="manualPunchDate">التاريخ</label>
        <input class="control" type="date" id="manualPunchDate">
      </div>
      <div class="form-field">
        <label for="manualPunchTime">الوقت</label>
        <input class="control" type="time" id="manualPunchTime">
      </div>
      <div class="form-field">
        <label for="manualPunchType">نوع البصمة</label>
        <select class="control" id="manualPunchType">
          <option value="in">دخول</option>
          <option value="out">خروج</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label>اختر الموظف</label>
      <div class="employee-picker" id="manualEmployeePicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" type="button" onclick="addManualPunch()">إضافة</button>
      <button class="btn" type="button" onclick="closeAddPunchModal()">إلغاء</button>
    </div>
  </div>
</div>

<div class="edit-popover hidden" id="punchEditMenu">
  <button class="btn btn-primary" type="button" id="punchEditButton" onclick="showPunchDeleteChoices()">تعديل</button>
  <button class="btn btn-danger hidden" type="button" id="punchDeleteButton" onclick="deleteSelectedPunch()">حذف</button>
  <button class="btn hidden" type="button" id="punchCancelButton" onclick="closePunchEditMenu()">إلغاء</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC5aYsmT1qUJd5D8GVh5WlIlLeiT35t8WQ",
  authDomain: "hrpro-f80e7.firebaseapp.com",
  databaseURL: "https://hrpro-f80e7-default-rtdb.firebaseio.com",
  projectId: "hrpro-f80e7",
  storageBucket: "hrpro-f80e7.firebasestorage.app",
  messagingSenderId: "999134303706",
  appId: "1:999134303706:web:a9f0b7bacb6ba796f55ce3",
  measurementId: "G-JFC4SPKXDK"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const colors = ['#2563eb','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#14b8a6','#f97316'];
const state = {employees:[], schedules:{}, punches:[], hrLoaded:false, punchesLoaded:false, selectedManualEmpId:'', selectedPunchId:''};
const dateDayKeys = ['sun','mon','tue','wed','thu','fri','sat'];
const branchNames = {
  surra:'حولي',
  abulhasania:'ابو الحصانية',
  yarmouk:'اليرموك'
};

function setConnectionStatus(text,type=''){
  const el = document.getElementById('connectionStatus');
  el.textContent = text;
  el.className = `status ${type}`.trim();
}

function returnToSystem(){
  if(window.history.length > 1){
    window.history.back();
    return;
  }
  window.location.href = 'index.html';
}

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
}

function formatDateInput(date=new Date()){
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseDateInput(value){
  if(!value) return new Date();
  const [y,m,d] = String(value).split('-').map(Number);
  return new Date(y,m-1,d);
}

function timeToMin(time){
  const [h,m] = String(time || '00:00').split(':').map(Number);
  return (h || 0) * 60 + (m || 0);
}

function formatTimeValue(time){
  if(!time) return '';
  const [hourPart, minutePart='0'] = String(time).split(':');
  const hour = parseInt(hourPart,10);
  const minute = parseInt(minutePart,10);
  if(Number.isNaN(hour) || Number.isNaN(minute)) return time;
  const suffix = hour < 12 ? 'ص' : 'م';
  const displayHour = hour % 12 || 12;
  return minute ? `${displayHour}:${String(minute).padStart(2,'0')}${suffix}` : `${displayHour}${suffix}`;
}

function getArabicDayName(date){
  return ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][date.getDay()];
}

function hexToRgba(hex, alpha){
  const value = String(hex || '#2563eb').replace('#','');
  const full = value.length === 3 ? value.split('').map(ch=>ch+ch).join('') : value;
  const int = parseInt(full,16);
  const r = (int >> 16) & 255;
  const g = (int >> 8) & 255;
  const b = int & 255;
  return `rgba(${r},${g},${b},${alpha})`;
}

function colorForKey(key){
  const text = String(key || '');
  let hash = 0;
  for(let i=0;i<text.length;i++) hash = ((hash << 5) - hash) + text.charCodeAt(i);
  return colors[Math.abs(hash) % colors.length];
}

function getInitials(name){
  return String(name || 'موظف').trim().split(/\s+/).slice(0,2).map(part=>part[0] || '').join('');
}

function getEmployeePhoto(emp){
  const value = String(emp?.photoData || '').trim();
  return /^data:image\//.test(value) || /^https?:\/\//.test(value) ? value : '';
}

function getEmployeeName(empId){
  return getEmployeesForReport().find(emp=>emp.id === empId)?.name || empId || 'موظف';
}

function buildLocalIso(dateValue, timeValue){
  const [year,month,day] = String(dateValue).split('-').map(Number);
  const [hour,minute] = String(timeValue || '00:00').split(':').map(Number);
  return new Date(year, (month || 1) - 1, day || 1, hour || 0, minute || 0, 0, 0).toISOString();
}

function normalizeEmployees(value){
  const list = Array.isArray(value) ? value : Object.values(value || {});
  return list
    .filter(emp=>emp && emp.id)
    .map(emp=>({
      id:emp.id,
      name:emp.name || emp.empName || 'موظف',
      position:emp.position || '',
      employer:emp.employer || '',
      photoData:emp.photoData || emp.photo || emp.profilePhoto || emp.avatar || emp.documents?.photo?.fileData || '',
      schedType:emp.schedType || '',
      segments:Array.isArray(emp.segments) ? emp.segments : []
    }))
    .sort((a,b)=>String(a.name).localeCompare(String(b.name),'ar'));
}

function normalizePunches(value){
  return Object.entries(value || {}).map(([id,punch])=>({
    id,
    ...punch
  })).sort((a,b)=>String(a.iso || '').localeCompare(String(b.iso || '')));
}

function getEmployeesForReport(){
  if(state.employees.length) return state.employees;
  const byId = {};
  state.punches.forEach(punch=>{
    if(!punch.empId) return;
    byId[punch.empId] = {id:punch.empId, name:punch.empName || punch.empId};
  });
  return Object.values(byId).sort((a,b)=>String(a.name).localeCompare(String(b.name),'ar'));
}

function getPunchDate(punch){
  if(punch.date) return punch.date;
  return punch.iso ? formatDateInput(new Date(punch.iso)) : '';
}

function getPunchTime(punch){
  if(punch.time) return punch.time;
  if(!punch.iso) return '';
  const d = new Date(punch.iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function punchTimeToMinutes(punch){
  return timeToMin(getPunchTime(punch));
}

function getPunchesForDate(dateValue, empId=''){
  return state.punches
    .filter(punch=>getPunchDate(punch) === dateValue && (!empId || punch.empId === empId))
    .sort((a,b)=>punchTimeToMinutes(a)-punchTimeToMinutes(b));
}

function getDateRangeValues(fromValue,toValue){
  let start = parseDateInput(fromValue);
  let end = parseDateInput(toValue);
  start.setHours(0,0,0,0);
  end.setHours(0,0,0,0);
  if(start > end) [start,end] = [end,start];
  const values = [];
  for(const d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
    values.push(formatDateInput(d));
  }
  return values;
}

function getTimeColumns(punches){
  return [...new Set(punches.map(getPunchTime).filter(Boolean))]
    .sort((a,b)=>timeToMin(a)-timeToMin(b));
}

function normalizeBranchName(value){
  const text = String(value || '').trim();
  if(!text) return '';
  if(/حولي|hawally|hawalli|السرة|surra/i.test(text)) return 'حولي';
  if(/أبو الحصانية|ابو الحصانية|hasaniya|hasania/i.test(text)) return 'ابو الحصانية';
  if(/اليرموك|yarmouk/i.test(text)) return 'اليرموك';
  return text.replace(/^فرع\s+/,'');
}

function getScheduleItemsForEmployee(empId, dateValue){
  const date = parseDateInput(dateValue);
  const dayKey = dateDayKeys[date.getDay()];
  const schedule = state.schedules?.[dayKey] || {};
  const scheduledItems = Object.entries(schedule.zones || {})
    .flatMap(([zone,items])=>(Array.isArray(items) ? items : []).map(item=>({
      ...item,
      zone,
      branchName:branchNames[zone] || normalizeBranchName(item.employerName || item.employer || item.branchName)
    })))
    .filter(item=>item.empId === empId && item.from && item.to);
  if(scheduledItems.length) return scheduledItems.sort((a,b)=>timeToMin(a.from)-timeToMin(b.from));
  const emp = getEmployeesForReport().find(item=>item.id === empId);
  if(emp?.schedType === 'fixed' && Array.isArray(emp.segments)){
    return emp.segments
      .filter(item=>item.from && item.to)
      .map(item=>({
        ...item,
        branchName:normalizeBranchName(item.employerName || item.employer || emp.employer)
      }))
      .sort((a,b)=>timeToMin(a.from)-timeToMin(b.from));
  }
  return [];
}

function getScheduledWindow(empId, dateValue){
  const items = getScheduleItemsForEmployee(empId,dateValue);
  if(!items.length) return null;
  return {
    start:Math.min(...items.map(item=>timeToMin(item.from))),
    end:Math.max(...items.map(item=>timeToMin(item.to)))
  };
}

function getPunchIssueLabel(punch, row, sortedPunches){
  if(!row.empId || !row.dateValue) return '';
  const scheduleWindow = getScheduledWindow(row.empId,row.dateValue);
  if(!scheduleWindow) return '';
  const punchMinutes = punchTimeToMinutes(punch);
  const firstPunch = sortedPunches[0];
  const lastPunch = sortedPunches[sortedPunches.length - 1];
  const isFirstPunch = punch === firstPunch;
  const isLastPunch = punch === lastPunch && sortedPunches.length > 1;
  if((punch.type === 'in' || !punch.type) && isFirstPunch && punchMinutes > scheduleWindow.start){
    return `تأخير ${punchMinutes - scheduleWindow.start} دقائق`;
  }
  if((punch.type === 'out' || !punch.type) && isLastPunch && punchMinutes < scheduleWindow.end){
    return `مغادرة مبكرة ${scheduleWindow.end - punchMinutes} دقائق`;
  }
  return '';
}

function getPunchTypeLabel(punch, sortedPunches){
  if(punch.type === 'out') return 'بصمة خروج';
  if(punch.type === 'in') return 'بصمة دخول';
  const index = sortedPunches.indexOf(punch);
  return index % 2 === 0 ? 'بصمة دخول' : 'بصمة خروج';
}

function getPunchBranchName(punch, row, sortedPunches){
  const punchBranch = normalizeBranchName(punch?.location?.branchName || punch?.branchName || punch?.location?.branchKey || punch?.branchKey);
  if(punchBranch) return punchBranch;
  if(!row.empId || !row.dateValue) return '';
  const items = getScheduleItemsForEmployee(row.empId,row.dateValue);
  if(!items.length) return '';
  const punchMinutes = punchTimeToMinutes(punch);
  const direct = items.find(item=>punchMinutes >= timeToMin(item.from) && punchMinutes <= timeToMin(item.to));
  if(direct?.branchName) return direct.branchName;
  const index = sortedPunches.indexOf(punch);
  const typeLabel = getPunchTypeLabel(punch,sortedPunches);
  if(typeLabel === 'بصمة دخول') return items[0]?.branchName || '';
  if(typeLabel === 'بصمة خروج') return items[items.length - 1]?.branchName || '';
  return items[Math.min(index,items.length - 1)]?.branchName || '';
}

function getRowAttendanceTotals(row){
  const sortedPunches = [...(row.punches || [])].sort((a,b)=>punchTimeToMinutes(a)-punchTimeToMinutes(b));
  if(!row.empId || !row.dateValue || !sortedPunches.length) return {late:0, early:0, total:0};
  const scheduleWindow = getScheduledWindow(row.empId,row.dateValue);
  if(!scheduleWindow) return {late:0, early:0, total:0};
  const firstPunch = sortedPunches[0];
  const lastPunch = sortedPunches[sortedPunches.length - 1];
  const firstMinutes = punchTimeToMinutes(firstPunch);
  const lastMinutes = punchTimeToMinutes(lastPunch);
  const late = firstMinutes > scheduleWindow.start ? firstMinutes - scheduleWindow.start : 0;
  const hasExitPunch = sortedPunches.length > 1 && (lastPunch.type === 'out' || !lastPunch.type);
  const early = hasExitPunch && lastMinutes < scheduleWindow.end ? scheduleWindow.end - lastMinutes : 0;
  return {late, early, total:late + early};
}

function sumAttendanceTotals(rows){
  return rows.reduce((acc,row)=>{
    const totals = getRowAttendanceTotals(row);
    acc.late += totals.late;
    acc.early += totals.early;
    acc.total += totals.total;
    return acc;
  },{late:0, early:0, total:0});
}

function formatMinutesDuration(minutes){
  const value = Math.max(0, Math.round(Number(minutes) || 0));
  const hours = Math.floor(value / 60);
  const mins = value % 60;
  if(hours && mins) return `${hours} ساعة و ${mins} دقيقة`;
  if(hours) return `${hours} ساعة`;
  return `${mins} دقيقة`;
}

function buildFingerprintSummary(totals){
  return `<div class="fingerprint-summary">
    <div class="summary-card"><div class="summary-label">ساعات التأخير</div><div class="summary-value alert">${formatMinutesDuration(totals.late)}</div></div>
    <div class="summary-card"><div class="summary-label">ساعات الخروج المبكر</div><div class="summary-value alert">${formatMinutesDuration(totals.early)}</div></div>
    <div class="summary-card"><div class="summary-label">الإجمالي</div><div class="summary-value">${formatMinutesDuration(totals.total)}</div></div>
  </div>`;
}

function buildFingerprintTable(rows, columns, firstHeader='اسم الموظف'){
  if(!columns.length) return '<div class="empty">لا توجد بصمات في الفترة المحددة</div>';
  const head = columns.map(time=>`<th>${formatTimeValue(time)}</th>`).join('');
  const body = rows.map(row=>{
    const color = row.color || colorForKey(row.key);
    const sortedPunches = [...row.punches].sort((a,b)=>punchTimeToMinutes(a)-punchTimeToMinutes(b));
    const hitsByTime = new Map();
    sortedPunches.forEach(punch=>{
      const time = getPunchTime(punch);
      if(!hitsByTime.has(time)) hitsByTime.set(time,[]);
      hitsByTime.get(time).push(punch);
    });
    const ranges = [];
    for(let i=0;i<sortedPunches.length;i+=2){
      const start = columns.indexOf(getPunchTime(sortedPunches[i]));
      const endPunch = sortedPunches[i+1] || sortedPunches[i];
      const end = columns.indexOf(getPunchTime(endPunch));
      if(start >= 0 && end >= 0) ranges.push([Math.min(start,end),Math.max(start,end)]);
    }
    const cells = columns.map((time,idx)=>{
      const hits = hitsByTime.get(time) || [];
      const isBridge = ranges.some(([start,end])=>idx >= start && idx <= end);
      const style = `--bridge-color:${hexToRgba(color,.16)};--hit-color:${color}`;
      const content = hits.map(punch=>{
        const issueLabel = getPunchIssueLabel(punch,row,sortedPunches);
        const punchTime = formatTimeValue(getPunchTime(punch));
        const typeLabel = getPunchTypeLabel(punch,sortedPunches);
        const branchName = getPunchBranchName(punch,row,sortedPunches);
        const label = issueLabel ? `${typeLabel} ${punchTime} - ${issueLabel}` : `${typeLabel} ${punchTime}`;
        const encodedId = encodeURIComponent(punch.id || '');
        return `<span class="fingerprint-hit ${issueLabel?'issue':''}" style="${style}" role="button" tabindex="0" onclick="showPunchEditMenu(event,'${encodedId}')"><span>${label}</span>${branchName?`<span class="fingerprint-hit-branch">${escapeHtml(branchName)}</span>`:''}</span>`;
      }).join(' ');
      return `<td class="fingerprint-cell ${isBridge?'bridge':''}" style="${style}">${content}</td>`;
    }).join('');
    return `<tr><td>${escapeHtml(row.label)}</td>${cells}</tr>`;
  }).join('');
  return `<div class="grid-wrap"><table class="fingerprint-table"><thead><tr><th>${escapeHtml(firstHeader)}</th>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function ensureControls(){
  const today = formatDateInput(new Date());
  const dayInput = document.getElementById('dayDate');
  const fromInput = document.getElementById('fromDate');
  const toInput = document.getElementById('toDate');
  if(dayInput && !dayInput.value) dayInput.value = today;
  if(fromInput && !fromInput.value) fromInput.value = today.slice(0,8)+'01';
  if(toInput && !toInput.value) toInput.value = today;
  const employeeSelect = document.getElementById('employeeSelect');
  if(employeeSelect){
    const employees = getEmployeesForReport();
    const current = employeeSelect.value;
    employeeSelect.innerHTML = employees.map(emp=>`<option value="${escapeHtml(emp.id)}">${escapeHtml(emp.name)}</option>`).join('');
    if(current && employees.some(emp=>emp.id === current)) employeeSelect.value = current;
  }
}

function updateStats(){
  if(!document.getElementById('employeesCount')) return;
  const today = formatDateInput(new Date());
  const todayPunches = getPunchesForDate(today);
  document.getElementById('employeesCount').textContent = getEmployeesForReport().length;
  document.getElementById('todayPunchesCount').textContent = todayPunches.length;
  document.getElementById('firstPunch').textContent = todayPunches[0] ? formatTimeValue(getPunchTime(todayPunches[0])) : '-';
  document.getElementById('lastPunch').textContent = todayPunches.at(-1) ? formatTimeValue(getPunchTime(todayPunches.at(-1))) : '-';
}

function renderReport(){
  const view = document.getElementById('reportView');
  const subtitle = document.getElementById('reportSubtitle');
  ensureControls();
  if(!state.hrLoaded || !state.punchesLoaded){
    view.innerHTML = '<div class="empty">جاري تحميل بيانات البصمة...</div>';
    return;
  }
  const mode = document.getElementById('reportMode').value;
  const dayInput = document.getElementById('dayDate');
  const employeeSelect = document.getElementById('employeeSelect');
  const fromInput = document.getElementById('fromDate');
  const toInput = document.getElementById('toDate');
  const isEmployeeMode = mode === 'employee';
  dayInput.style.display = isEmployeeMode ? 'none' : '';
  employeeSelect.style.display = isEmployeeMode ? '' : 'none';
  fromInput.style.display = isEmployeeMode ? '' : 'none';
  toInput.style.display = isEmployeeMode ? '' : 'none';

  const employees = getEmployeesForReport();
  if(!employees.length){
    subtitle.textContent = 'لا توجد بيانات موظفين منشورة بعد. اعتمد جدول توزيع من النظام أولاً.';
    view.innerHTML = '<div class="empty">لا توجد بيانات موظفين في Firebase</div>';
    return;
  }

  if(isEmployeeMode){
    const empId = employeeSelect.value || employees[0]?.id || '';
    const emp = employees.find(item=>item.id === empId);
    const fromValue = fromInput.value || formatDateInput(new Date());
    const toValue = toInput.value || fromValue;
    const dates = getDateRangeValues(fromValue,toValue);
    const allPunches = dates.flatMap(date=>getPunchesForDate(date,empId));
    const columns = getTimeColumns(allPunches);
    const rows = dates.map(dateValue=>{
      const date = parseDateInput(dateValue);
      return {
        key:dateValue,
        label:`${getArabicDayName(date)} ${date.toLocaleDateString('ar-KW')}`,
        empId,
        dateValue,
        color:colorForKey(empId || dateValue),
        punches:getPunchesForDate(dateValue,empId)
      };
    });
    subtitle.textContent = emp ? `${emp.name} من ${parseDateInput(fromValue).toLocaleDateString('ar-KW')} إلى ${parseDateInput(toValue).toLocaleDateString('ar-KW')}` : '';
    view.innerHTML = buildFingerprintTable(rows,columns,'اليوم') + buildFingerprintSummary(sumAttendanceTotals(rows));
    return;
  }

  const dateValue = dayInput.value || formatDateInput(new Date());
  const reportDate = parseDateInput(dateValue);
  const punches = getPunchesForDate(dateValue);
  const columns = getTimeColumns(punches);
  const rows = employees.map(emp=>({
    key:emp.id,
    label:emp.name,
    empId:emp.id,
    dateValue,
    color:colorForKey(emp.id),
    punches:getPunchesForDate(dateValue,emp.id)
  }));
  subtitle.textContent = `${getArabicDayName(reportDate)} ${reportDate.toLocaleDateString('ar-KW')}`;
  view.innerHTML = buildFingerprintTable(rows,columns,'اسم الموظف');
}

function openAddPunchModal(){
  ensureControls();
  const employees = getEmployeesForReport();
  if(!employees.length){
    alert('لا توجد بيانات موظفين لإضافة بصمة.');
    return;
  }
  const mode = document.getElementById('reportMode').value;
  const selectedFromReport = mode === 'employee' ? document.getElementById('employeeSelect').value : '';
  state.selectedManualEmpId = selectedFromReport || employees[0].id;
  const dateValue = mode === 'day'
    ? document.getElementById('dayDate').value
    : (document.getElementById('fromDate').value || formatDateInput(new Date()));
  const now = new Date();
  document.getElementById('manualPunchDate').value = dateValue || formatDateInput(now);
  document.getElementById('manualPunchTime').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('manualPunchType').value = 'in';
  renderManualEmployeePicker();
  document.getElementById('addPunchModal').classList.remove('hidden');
}

function closeAddPunchModal(event){
  if(event && event.target?.id !== 'addPunchModal') return;
  document.getElementById('addPunchModal').classList.add('hidden');
}

function renderManualEmployeePicker(){
  const picker = document.getElementById('manualEmployeePicker');
  const employees = getEmployeesForReport();
  picker.innerHTML = employees.map(emp=>{
    const selected = emp.id === state.selectedManualEmpId;
    const color = colorForKey(emp.id);
    const photo = getEmployeePhoto(emp);
    const avatar = photo
      ? `<span class="employee-avatar"><img src="${escapeHtml(photo)}" alt=""></span>`
      : `<span class="employee-avatar" style="background:${hexToRgba(color,.16)};color:${color}">${escapeHtml(getInitials(emp.name))}</span>`;
    return `<button class="employee-option ${selected?'selected':''}" type="button" onclick="selectManualEmployee('${encodeURIComponent(emp.id)}')">
      ${avatar}
      <span class="employee-option-name">${escapeHtml(emp.name)}</span>
    </button>`;
  }).join('');
}

function selectManualEmployee(encodedEmpId){
  state.selectedManualEmpId = decodeURIComponent(encodedEmpId || '');
  renderManualEmployeePicker();
}

async function addManualPunch(){
  const emp = getEmployeesForReport().find(item=>item.id === state.selectedManualEmpId);
  const dateValue = document.getElementById('manualPunchDate').value;
  const timeValue = document.getElementById('manualPunchTime').value;
  const typeValue = document.getElementById('manualPunchType').value;
  if(!emp || !dateValue || !timeValue){
    alert('اختر الموظف والتاريخ والوقت أولاً.');
    return;
  }
  const payload = {
    empId:emp.id,
    empName:emp.name,
    type:typeValue,
    date:dateValue,
    time:timeValue,
    iso:buildLocalIso(dateValue,timeValue),
    manual:true,
    source:'manual-report',
    createdAt:new Date().toISOString()
  };
  try{
    await db.ref('fingerprintPunches').push(payload);
    closeAddPunchModal();
  } catch(err){
    console.error(err);
    alert('تعذر إضافة البصمة. تأكد من الاتصال وصلاحيات Firebase.');
  }
}

function showPunchEditMenu(event, encodedPunchId){
  event.stopPropagation();
  const id = decodeURIComponent(encodedPunchId || '');
  if(!id) return;
  state.selectedPunchId = id;
  const menu = document.getElementById('punchEditMenu');
  document.getElementById('punchEditButton').classList.remove('hidden');
  document.getElementById('punchDeleteButton').classList.add('hidden');
  document.getElementById('punchCancelButton').classList.add('hidden');
  menu.classList.remove('hidden');
  const rect = event.currentTarget.getBoundingClientRect();
  const top = Math.max(8, rect.top - menu.offsetHeight - 8);
  const left = Math.min(Math.max(8, rect.left + rect.width / 2 - menu.offsetWidth / 2), window.innerWidth - menu.offsetWidth - 8);
  menu.style.top = `${top}px`;
  menu.style.left = `${left}px`;
}

function showPunchDeleteChoices(){
  document.getElementById('punchEditButton').classList.add('hidden');
  document.getElementById('punchDeleteButton').classList.remove('hidden');
  document.getElementById('punchCancelButton').classList.remove('hidden');
}

function closePunchEditMenu(){
  document.getElementById('punchEditMenu').classList.add('hidden');
  state.selectedPunchId = '';
}

async function deleteSelectedPunch(){
  if(!state.selectedPunchId) return;
  try{
    await db.ref(`fingerprintPunches/${state.selectedPunchId}`).remove();
    closePunchEditMenu();
  } catch(err){
    console.error(err);
    alert('تعذر حذف البصمة. تأكد من الاتصال وصلاحيات Firebase.');
  }
}

function getReportFileBaseName(){
  const mode = document.getElementById('reportMode').value;
  if(mode === 'employee'){
    const empName = getEmployeeName(document.getElementById('employeeSelect').value);
    return `تقرير البصمة - ${empName} - ${document.getElementById('fromDate').value || ''} إلى ${document.getElementById('toDate').value || ''}`.trim();
  }
  return `تقرير البصمة - ${document.getElementById('dayDate').value || formatDateInput(new Date())}`;
}

function cloneReportWithInlineStyles(){
  const source = document.getElementById('reportView');
  const clone = source.cloneNode(true);
  const sourceNodes = [source, ...source.querySelectorAll('*')];
  const cloneNodes = [clone, ...clone.querySelectorAll('*')];
  const props = ['display','flex-direction','align-items','justify-content','gap','background-color','color','font-family','font-size','font-weight','line-height','border','border-left','border-bottom','border-radius','box-shadow','padding','margin','width','min-width','height','min-height','text-align','white-space','position','right','top','z-index'];
  sourceNodes.forEach((node,index)=>{
    const target = cloneNodes[index];
    if(!target || !(node instanceof HTMLElement) || !(target instanceof HTMLElement)) return;
    const styles = window.getComputedStyle(node);
    target.style.cssText += props.map(prop=>`${prop}:${styles.getPropertyValue(prop)}`).join(';');
  });
  return clone.outerHTML;
}

function buildExportHtml(){
  const title = 'تقرير البصمة';
  const subtitle = document.getElementById('reportSubtitle').textContent || '';
  return `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>${escapeHtml(getReportFileBaseName())}</title>
    <style>
      @page{size:A4 landscape;margin:12mm}
      body{font-family:'Tajawal','Cairo',Arial,sans-serif;background:#f4f7fb;color:#111827;margin:0;padding:18px;direction:rtl}
      .export-sheet{background:#fff;border:1px solid #dbe3ef;border-radius:14px;padding:18px}
      h1{font-size:24px;margin:0 0 6px;color:#0f172a}
      .export-subtitle{color:#64748b;margin-bottom:16px;font-weight:800}
      table{width:100%;border-collapse:separate;border-spacing:0}
      th,td{border:1px solid #dbe3ef;padding:8px;text-align:center}
    </style></head><body><section class="export-sheet"><h1>${title}</h1><div class="export-subtitle">${escapeHtml(subtitle)}</div>${cloneReportWithInlineStyles()}</section></body></html>`;
}

function downloadReportExcel(){
  if(!document.querySelector('#reportView table')){
    alert('لا يوجد جدول جاهز للتحميل.');
    return;
  }
  const html = `\ufeff${buildExportHtml()}`;
  const blob = new Blob([html], {type:'application/vnd.ms-excel;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${getReportFileBaseName()}.xls`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function downloadReportPdf(){
  if(!document.querySelector('#reportView table')){
    alert('لا يوجد جدول جاهز للتحميل.');
    return;
  }
  const win = window.open('', '_blank');
  if(!win){
    alert('المتصفح منع فتح نافذة الطباعة. اسمح بالنوافذ المنبثقة ثم حاول مرة أخرى.');
    return;
  }
  win.document.open();
  win.document.write(buildExportHtml());
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(), 350);
}

function startFirebaseListeners(){
  db.ref('.info/connected').on('value', snap=>{
    setConnectionStatus(snap.val() ? 'متصل' : 'غير متصل', snap.val() ? 'connected' : 'error');
  });
  db.ref('hrData').on('value', snap=>{
    const value = snap.val() || {};
    state.employees = normalizeEmployees(value.employees);
    state.schedules = value.schedules || {};
    state.hrLoaded = true;
    renderReport();
  }, err=>{
    console.error(err);
    setConnectionStatus('خطأ في قراءة بيانات الموظفين','error');
  });
  db.ref('fingerprintPunches').on('value', snap=>{
    state.punches = normalizePunches(snap.val());
    state.punchesLoaded = true;
    renderReport();
  }, err=>{
    console.error(err);
    setConnectionStatus('خطأ في قراءة البصمات','error');
  });
}

document.addEventListener('DOMContentLoaded', ()=>{
  ensureControls();
  startFirebaseListeners();
  document.addEventListener('click', event=>{
    const menu = document.getElementById('punchEditMenu');
    if(menu && !menu.classList.contains('hidden') && !menu.contains(event.target)){
      closePunchEditMenu();
    }
  });
});
